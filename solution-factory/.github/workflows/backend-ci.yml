name: Backend CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solution-factory/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.300
      - name: Restore
        run: dotnet restore src/CloudSolutionFactory.Api/CloudSolutionFactory.Api.csproj
      - name: Build
        run: dotnet build src/CloudSolutionFactory.Api/CloudSolutionFactory.Api.csproj --no-restore --configuration Release
      - name: Test (safe if none)
        run: |
          if find . -name '*Tests.csproj' | grep -q .; then
            dotnet test --configuration Release --no-build
          else
            echo 'No test project found. Skipping.'
          fi
