name: Infra CI (Bicep Validate)

on:
  pull_request:
    paths:
      - 'solution-factory/infra/**'
      - '.github/workflows/infra-*.yml'
  push:
    branches: [main]
    paths:
      - 'solution-factory/infra/**'
      - '.github/workflows/infra-*.yml'

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solution-factory
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep deployment
        run: |
          az deployment group validate \
            --resource-group "${{ vars.AZURE_DEV_RESOURCE_GROUP }}" \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/main.dev.parameters.json
